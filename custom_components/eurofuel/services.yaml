find_cheapest:
  name: Vind goedkoopste tankstation
  description: Zoek het goedkoopste tankstation voor een brandstoftype binnen een straal.
  fields:
    fuel_type:
      name: Brandstoftype
      description: Kies uit e5, e10, diesel of lpg.
      required: true
      selector:
        select:
          options:
            - e5
            - e10
            - diesel
            - lpg
    device_tracker:
      name: Device tracker
      description: Optioneel device_tracker entity_id voor de zoeklocatie.
      required: false
      selector:
        entity:
          domain: device_tracker
    latitude:
      name: Latitude
      required: false
      selector:
        number:
          min: -90
          max: 90
          step: 0.0001
    longitude:
      name: Longitude
      required: false
      selector:
        number:
          min: -180
          max: 180
          step: 0.0001
    radius_km:
      name: Straal in km
      required: false
      selector:
        number:
          min: 1
          max: 200
          step: 1
    country_codes:
      name: Landcodes
      description: Optionele lijst met Europese ISO-landcodes.
      required: false
      selector:
        object:
